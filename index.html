<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Barony Build Creator</title>
    <link rel="stylesheet" href="dist/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/@alpinejs/persist@3.x.x/dist/cdn.min.js" defer></script>
    <script src="src/main.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  </head>
  <body class="bg-zinc-950 text-zinc-100 min-h-screen">
    <div
      x-data="buildPlanner()"
      x-init="init()"
      x-cloak
      class="max-w-7xl mx-auto px-4 py-8"
    >
      <header class="mb-8 flex items-center justify-between flex-wrap gap-4">
        <div>
          <h1 class="text-3xl font-bold tracking-tight">Barony Build Creator</h1>
          <p class="text-zinc-400 text-sm mt-1">
            Pick a race and class to see the buffs, debuffs and stats for your build.
          </p>
        </div>
        <div class="flex gap-2">
          <button
            @click="saveBuild()"
            :disabled="!selectedRaceId && !selectedClassId"
            class="px-4 py-2 rounded-lg bg-zinc-800 hover:bg-zinc-700 disabled:bg-zinc-800/50 disabled:text-zinc-600 disabled:cursor-not-allowed text-sm font-medium transition"
          >
            Save Build
          </button>
          <button
            @click="publishBuild()"
            :disabled="(!selectedRaceId && !selectedClassId) || publishing"
            class="px-4 py-2 rounded-lg bg-zinc-800 hover:bg-zinc-700 disabled:bg-zinc-800/50 disabled:text-zinc-600 disabled:cursor-not-allowed text-sm font-medium transition"
          >
            <span x-show="!publishing">Publish</span>
            <span x-show="publishing">Publishing…</span>
          </button>
          <button
            @click="shareUrl()"
            :disabled="!selectedRaceId && !selectedClassId"
            class="px-4 py-2 rounded-lg bg-emerald-600 hover:bg-emerald-500 disabled:bg-zinc-700 disabled:text-zinc-500 disabled:cursor-not-allowed text-sm font-medium transition"
          >
            <span x-show="!shareCopied">Copy Share Link</span>
            <span x-show="shareCopied">Copied!</span>
          </button>
          <button
            @click="reset()"
            class="px-4 py-2 rounded-lg bg-zinc-800 hover:bg-zinc-700 text-sm font-medium transition"
          >
            Reset
          </button>
        </div>
      </header>

      <div class="mb-8 flex flex-col sm:flex-row gap-2 max-w-xl">
        <input
          type="text"
          x-model="buildName"
          placeholder="Build name (optional)"
          maxlength="60"
          class="bg-transparent border-b border-zinc-800 focus:border-zinc-600 outline-none text-sm text-zinc-300 placeholder-zinc-600 py-1 sm:w-56"
        />
        <input
          type="text"
          x-model="buildDescription"
          placeholder="Short description (optional)"
          maxlength="140"
          class="bg-transparent border-b border-zinc-800 focus:border-zinc-600 outline-none text-sm text-zinc-300 placeholder-zinc-600 py-1 flex-1"
        />
        <input
          type="text"
          x-model="buildTags"
          placeholder="Tags, comma separated (optional)"
          maxlength="100"
          class="bg-transparent border-b border-zinc-800 focus:border-zinc-600 outline-none text-sm text-zinc-300 placeholder-zinc-600 py-1 sm:w-56"
        />
      </div>

      <div class="flex gap-8 items-start">
        <!-- Saved builds sidebar -->
        <aside class="hidden lg:block w-56 shrink-0 sticky top-8">
          <h2 class="text-xs font-semibold uppercase tracking-wide text-zinc-500 mb-2">Saved Builds</h2>
          <template x-if="savedBuilds.length === 0">
            <p class="text-xs text-zinc-600">No builds saved yet.</p>
          </template>
          <input
            x-show="savedBuilds.length > 0"
            type="text"
            x-model="savedBuildsSearch"
            placeholder="Search…"
            class="w-full mb-2 bg-transparent border-b border-zinc-800 focus:border-zinc-600 outline-none text-xs text-zinc-300 placeholder-zinc-600 py-1"
          />
          <div x-show="allSavedTags.length > 0" class="flex flex-wrap gap-1 mb-2">
            <template x-for="tag in allSavedTags" :key="tag">
              <button
                @click="toggleTagFilter(tag)"
                class="px-2 py-0.5 rounded-full text-[10px] border transition"
                :class="activeTagFilter === tag ? 'border-emerald-500 bg-emerald-500/10 text-emerald-400' : 'border-zinc-800 text-zinc-500 hover:border-zinc-600'"
                x-text="tag"
              ></button>
            </template>
          </div>
          <template x-if="savedBuilds.length > 0 && filteredSavedBuilds.length === 0">
            <p class="text-xs text-zinc-600">No matches.</p>
          </template>
          <ul class="space-y-1">
            <template x-for="build in filteredSavedBuilds" :key="build.id">
              <li class="group">
                <div class="flex items-center gap-1">
                  <button
                    @click="loadBuild(build)"
                    class="flex-1 text-left text-xs px-2 py-1.5 rounded-md text-zinc-400 hover:text-zinc-100 hover:bg-zinc-900 transition truncate"
                    :title="`${build.name} — ${raceName(build.race)} / ${className(build.class)}`"
                    x-text="build.name"
                  ></button>
                  <button
                    @click.stop="deleteBuild(build.id)"
                    class="opacity-0 group-hover:opacity-100 text-zinc-600 hover:text-rose-400 text-xs px-1 transition"
                    title="Delete"
                  >
                    ✕
                  </button>
                </div>
                <div x-show="(build.tags || []).length > 0" class="flex flex-wrap gap-1 px-2 pb-1">
                  <template x-for="tag in build.tags" :key="tag">
                    <span class="text-[10px] text-zinc-600" x-text="'#' + tag"></span>
                  </template>
                </div>
              </li>
            </template>
          </ul>
        </aside>

        <div class="flex-1 min-w-0">
      <template x-if="!dataLoaded">
        <p class="text-zinc-400">Loading data…</p>
      </template>

      <template x-if="dataLoaded">
        <div class="space-y-10">
          <!-- Race selection -->
          <section>
            <h2 class="text-xl font-semibold mb-3">Race</h2>
            <div class="flex gap-2 mb-3 flex-wrap">
              <template x-for="tab in raceTabs" :key="tab">
                <button
                  @click="activeRaceTab = tab"
                  class="px-3 py-1 rounded-full text-xs font-medium border transition"
                  :class="activeRaceTab === tab ? 'border-emerald-500 bg-emerald-500/10 text-emerald-400' : 'border-zinc-800 text-zinc-400 hover:border-zinc-600'"
                  x-text="tab"
                ></button>
              </template>
            </div>
            <div class="grid grid-cols-3 sm:grid-cols-5 md:grid-cols-7 lg:grid-cols-9 gap-3">
              <template x-for="race in filteredRaces" :key="race.id">
                <button
                  @click="selectRace(race.id)"
                  class="flex flex-col items-center gap-1 p-2 rounded-lg border-2 transition"
                  :class="selectedRaceId === race.id ? 'border-emerald-500 bg-emerald-500/10' : 'border-zinc-800 hover:border-zinc-600 bg-zinc-900'"
                >
                  <img :src="race.iconLocal" :alt="race.name" class="w-10 h-10 object-contain" loading="lazy" />
                  <span class="text-xs text-center" x-text="race.name"></span>
                </button>
              </template>
            </div>
          </section>

          <!-- Class selection -->
          <section>
            <h2 class="text-xl font-semibold mb-3">Class</h2>
            <div class="flex gap-2 mb-3 flex-wrap">
              <template x-for="tab in classTabs" :key="tab">
                <button
                  @click="activeClassTab = tab"
                  class="px-3 py-1 rounded-full text-xs font-medium border transition"
                  :class="activeClassTab === tab ? 'border-emerald-500 bg-emerald-500/10 text-emerald-400' : 'border-zinc-800 text-zinc-400 hover:border-zinc-600'"
                  x-text="tab"
                ></button>
              </template>
            </div>
            <div class="grid grid-cols-3 sm:grid-cols-5 md:grid-cols-7 lg:grid-cols-9 gap-3">
              <template x-for="cls in filteredClasses" :key="cls.id">
                <button
                  @click="selectClass(cls.id)"
                  class="flex flex-col items-center gap-1 p-2 rounded-lg border-2 transition"
                  :class="selectedClassId === cls.id ? 'border-emerald-500 bg-emerald-500/10' : 'border-zinc-800 hover:border-zinc-600 bg-zinc-900'"
                >
                  <img :src="cls.iconLocal" :alt="cls.name" class="w-10 h-10 object-contain" loading="lazy" />
                  <span class="text-xs text-center" x-text="cls.name"></span>
                </button>
              </template>
            </div>
          </section>

          <!-- Summary -->
          <section class="grid md:grid-cols-3 gap-6">
            <!-- Stats -->
            <div class="bg-zinc-900 rounded-xl p-5 border border-zinc-800">
              <h3 class="text-lg font-semibold mb-3">Stats</h3>
              <template x-if="!selectedClass && !selectedRace">
                <p class="text-zinc-500 text-sm">Select a race and class to see stats.</p>
              </template>
              <ul class="space-y-1 text-sm" x-show="selectedClass || selectedRace">
                <template x-for="stat in Object.keys(finalStats)" :key="stat">
                  <li class="flex justify-between">
                    <span class="text-zinc-400" x-text="stat"></span>
                    <span x-text="finalStats[stat]"></span>
                  </li>
                </template>
              </ul>
            </div>

            <!-- Buffs -->
            <div class="bg-zinc-900 rounded-xl p-5 border border-zinc-800">
              <h3 class="text-lg font-semibold mb-3 text-emerald-400">Buffs</h3>
              <template x-if="combinedBuffs.length === 0">
                <p class="text-zinc-500 text-sm">Select a race and class to see buffs.</p>
              </template>
              <ul class="space-y-1 text-sm list-disc list-inside">
                <template x-for="(buff, i) in combinedBuffs" :key="i">
                  <li x-text="buff"></li>
                </template>
              </ul>
            </div>

            <!-- Debuffs -->
            <div class="bg-zinc-900 rounded-xl p-5 border border-zinc-800">
              <h3 class="text-lg font-semibold mb-3 text-rose-400">Debuffs</h3>
              <template x-if="combinedDebuffs.length === 0">
                <p class="text-zinc-500 text-sm">Select a race and class to see debuffs.</p>
              </template>
              <ul class="space-y-1 text-sm list-disc list-inside">
                <template x-for="(debuff, i) in combinedDebuffs" :key="i">
                  <li x-text="debuff"></li>
                </template>
              </ul>
            </div>
          </section>

          <!-- Starting equipment -->
          <section x-show="selectedClass" class="bg-zinc-900 rounded-xl p-5 border border-zinc-800">
            <h3 class="text-lg font-semibold mb-3">Starting Equipment</h3>
            <ul class="space-y-1 text-sm list-disc list-inside">
              <template x-for="(item, i) in (selectedClass?.startingEquipment || [])" :key="i">
                <li x-text="item"></li>
              </template>
            </ul>
          </section>

          <!-- Community builds -->
          <section>
            <h2 class="text-xl font-semibold mb-3">Community Builds</h2>
            <div class="flex flex-col sm:flex-row gap-2 mb-3">
              <input
                type="text"
                x-model="communitySearch"
                placeholder="Search community builds…"
                class="bg-transparent border-b border-zinc-800 focus:border-zinc-600 outline-none text-sm text-zinc-300 placeholder-zinc-600 py-1 sm:w-64"
              />
              <div x-show="allPublishedTags.length > 0" class="flex flex-wrap gap-1 items-center">
                <template x-for="tag in allPublishedTags" :key="tag">
                  <button
                    @click="toggleCommunityTagFilter(tag)"
                    class="px-2 py-0.5 rounded-full text-[10px] border transition"
                    :class="activeCommunityTagFilter === tag ? 'border-emerald-500 bg-emerald-500/10 text-emerald-400' : 'border-zinc-800 text-zinc-500 hover:border-zinc-600'"
                    x-text="tag"
                  ></button>
                </template>
              </div>
            </div>
            <template x-if="publishedBuilds.length === 0">
              <p class="text-zinc-500 text-sm">No community builds published yet. Be the first!</p>
            </template>
            <template x-if="publishedBuilds.length > 0 && filteredPublishedBuilds.length === 0">
              <p class="text-zinc-500 text-sm">No matches.</p>
            </template>
            <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-3">
              <template x-for="build in filteredPublishedBuilds" :key="build.id">
                <div class="relative group">
                  <button
                    @click="loadBuild(build)"
                    class="w-full text-left bg-zinc-900 rounded-xl p-4 border border-zinc-800 hover:border-zinc-600 transition"
                  >
                    <p class="text-sm font-medium truncate pr-4" x-text="build.name"></p>
                    <p class="text-xs text-zinc-500 mt-0.5" x-text="`${raceName(build.race)} / ${className(build.class)}`"></p>
                    <p x-show="build.description" class="text-xs text-zinc-400 mt-2 line-clamp-2" x-text="build.description"></p>
                    <div x-show="(build.tags || []).length > 0" class="flex flex-wrap gap-1 mt-2">
                      <template x-for="tag in build.tags" :key="tag">
                        <span class="text-[10px] text-zinc-600" x-text="'#' + tag"></span>
                      </template>
                    </div>
                  </button>
                  <button
                    x-show="isMine(build)"
                    @click.stop="deletePublishedBuild(build)"
                    class="absolute top-3 right-3 opacity-0 group-hover:opacity-100 text-zinc-600 hover:text-rose-400 text-xs transition"
                    title="Delete your published build"
                  >
                    ✕
                  </button>
                </div>
              </template>
            </div>
          </section>
        </div>
      </template>
        </div>
      </div>

      <footer class="mt-16 text-center text-xs text-zinc-600">
        Data sourced from
        <a href="https://barony.wiki.gg" target="_blank" rel="noopener" class="underline hover:text-zinc-400"
          >barony.wiki.gg</a
        >. Not affiliated with the Barony developers.
      </footer>
    </div>
  </body>
</html>
